version: "3.9"

services:

  # PostgreSQL database
  db:
    image: postgres:15-alpine
    container_name: vendorbridge_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       oddoHackathon
      POSTGRES_USER:     vendorbridge
      POSTGRES_PASSWORD: vendorbridge_pass
    ports:
      - "5432:5432"
    volumes:
      # Persistent data — survives container restarts
      - postgres_data:/var/lib/postgresql/data
      # SQL files mounted in alphabetical/numeric order, auto-run on first start
      - ./backend/model/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/model/triggers.sql:/docker-entrypoint-initdb.d/02_triggers.sql:ro
      - ./backend/model/seed.sql:/docker-entrypoint-initdb.d/03_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendorbridge -d oddoHackathon"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Express backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vendorbridge_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy    # waits for pg_isready before starting
    environment:
      PORT:          5000
      DB_HOST:       db               # service name, not localhost
      DB_PORT:       5432
      DB_NAME:       oddoHackathon
      DB_USER:       vendorbridge
      DB_PASSWORD:   vendorbridge_pass
      JWT_SECRET:    change_this_before_deploy
      JWT_EXPIRES_IN:          24h
      JWT_REFRESH_EXPIRES_IN:  7d
      NODE_ENV:      production
    ports:
      - "5000:5000"

  # Optional: pgAdmin for DB inspection during development
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vendorbridge_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@vendorbridge.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    profiles:
      - dev    # only starts when you run: docker compose --profile dev up

volumes:
  postgres_data: